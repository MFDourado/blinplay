<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BlinPlay · Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --gold:#F5A800; --dark:#1F2127; --dark2:#171920; --line:#2c2f38; --mut:#8b8f9a; --ok:#27c08a; --bad:#e35d5d; }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:'Segoe UI',Roboto,Arial,sans-serif;background:#0f1116;color:#e8e9ed}
  a{color:var(--gold)}
  .hidden{display:none!important}
  /* login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--dark);border:1px solid var(--line);border-radius:14px;padding:28px;width:100%;max-width:380px}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .brand .logo{height:38px;width:auto;display:block}
  .brand .logo.side{height:30px}
  .sub{color:var(--mut);text-align:center;font-size:13px;margin-bottom:20px}
  label{display:block;font-size:12px;color:var(--mut);margin:12px 0 5px}
  input,select{width:100%;background:var(--dark2);border:1px solid var(--line);color:#fff;border-radius:9px;padding:11px 12px;font-size:14px}
  input:focus,select:focus{outline:none;border-color:var(--gold)}
  button{cursor:pointer;border:none;border-radius:9px;font-weight:600;font-size:14px}
  .solid{background:var(--gold);color:#1a1a1a;padding:11px 16px}
  .solid:hover{filter:brightness(1.05)}
  .ghost{background:transparent;border:1px solid var(--line);color:#e8e9ed;padding:8px 12px}
  .ghost:hover{border-color:var(--gold)}
  .danger{background:transparent;border:1px solid #5a2b2b;color:#ff9b9b;padding:7px 11px}
  .msg{font-size:13px;margin-top:12px;min-height:18px}
  .msg.err{color:var(--bad)} .msg.ok{color:var(--ok)}
  /* app */
  #app{display:flex;min-height:100vh}
  .side{width:230px;background:var(--dark);border-right:1px solid var(--line);padding:18px 14px;flex-shrink:0}
  .side .brand{justify-content:flex-start;margin-bottom:20px}
  
  .nav{display:flex;flex-direction:column;gap:4px;margin-top:8px}
  .nav button{background:transparent;color:#cfd2da;text-align:left;padding:10px 12px;border-radius:8px;width:100%}
  .nav button.active{background:var(--dark2);color:#fff;border-left:3px solid var(--gold)}
  .nav .sec{color:var(--mut);font-size:11px;letter-spacing:1px;margin:14px 8px 4px}
  .who{margin-top:24px;font-size:12px;color:var(--mut);border-top:1px solid var(--line);padding-top:14px}
  .main{flex:1;padding:26px 30px;overflow:auto}
  h1{font-size:24px;margin:0 0 4px} h2{font-size:17px;margin:22px 0 10px}
  .top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:16px 0}
  .stat{background:var(--dark);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .stat .k{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:30px;font-weight:700;margin-top:6px}
  .stat .v.gold{color:var(--gold)}
  .panel{background:var(--dark);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:18px}
  .panel-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:1px solid var(--line)}
  td{padding:9px 10px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
  .pill.on{background:rgba(39,192,138,.15);color:var(--ok)} .pill.off{background:rgba(227,93,93,.15);color:var(--bad)}
  .pill.no{background:rgba(245,168,0,.15);color:var(--gold)}
  .code{font-family:Consolas,monospace;color:var(--gold);font-weight:700;letter-spacing:1px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .filters > div{min-width:140px}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal{background:var(--dark);border:1px solid var(--line);border-radius:14px;padding:22px;width:100%;max-width:460px;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 14px}
  .chk{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:14px}
  .chk input{width:auto}
  .mr{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
  small.hint{color:var(--mut)}
</style>
</head>

<script>
const SB_URL = "https://wjyaxmbkdjebulosdtds.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndqeWF4bWJrZGplYnVsb3NkdGRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMzkxOTksImV4cCI6MjA5NTcxNTE5OX0.SEaQ7V7hibJfVu1fjBaOBt7RIugnWzU2A-uO33aZxWU";
const FN_URL = SB_URL + "/functions/v1/admin-api";

const sb = window.supabase.createClient(SB_URL, SB_ANON);
let CUR_TAB = 'resumo';
let ACCOUNTS = [];   // {id,nome} para formularios

/* ---------- chamada à Edge Function ---------- */
async function call(acao, payload={}){
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ throw new Error('sessão expirada'); }
  const r = await fetch(FN_URL, {
    method:'POST',
    headers:{
      'Authorization':'Bearer '+session.access_token,
      'apikey':SB_ANON,
      'Content-Type':'application/json'
    },
    body: JSON.stringify({ acao, ...payload })
  });
  const j = await r.json().catch(()=>({erro:'resposta inválida'}));
  if(!r.ok || j.erro){ throw new Error(j.erro || ('erro '+r.status)); }
  return j;
}

/* ---------- login ---------- */
async function entrar(){
  const email=document.getElementById('lg_email').value.trim();
  const pass=document.getElementById('lg_pass').value;
  const msg=document.getElementById('lg_msg');
  msg.textContent='Entrando…'; msg.className='msg';
  const { error } = await sb.auth.signInWithPassword({ email, password:pass });
  if(error){ msg.textContent='E-mail ou senha inválidos.'; msg.className='msg err'; return; }
  // valida se é superadmin chamando a função
  try{
    await call('relatorio_resumo');
  }catch(e){
    msg.textContent='Acesso negado: este login não é superadmin.'; msg.className='msg err';
    await sb.auth.signOut(); return;
  }
  abrirApp(email);
}
async function sair(){ await sb.auth.signOut(); location.reload(); }

function abrirApp(email){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who_email').textContent = email;
  tab('resumo');
}

/* ---------- navegação ---------- */
function tab(t){
  CUR_TAB=t;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===t));
  if(t==='resumo') viewResumo();
  if(t==='usuarios') viewUsuarios();
  if(t==='telas') viewTelas();
  if(t==='campanhas') viewCampanhas();
  if(t==='contas') viewContas();
}
const V = ()=>document.getElementById('view');
function loading(){ V().innerHTML='<p style="color:var(--mut)">Carregando…</p>'; }
function fmtData(s){ if(!s) return '—'; const d=new Date(s); return d.toLocaleString('pt-BR'); }
function fmtBytes(b){ if(!b) return '0 MB'; return (b/1048576).toFixed(1)+' MB'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------- RESUMO ---------- */
async function viewResumo(){
  loading();
  try{
    const { resumo:r } = await call('relatorio_resumo');
    V().innerHTML = `
      <div class="top"><div><h1>Resumo</h1><small class="hint">Visão geral da operação BlinPlay</small></div>
        <button class="ghost" onclick="tab('resumo')">↻ Atualizar</button></div>
      <div class="cards">
        <div class="stat"><div class="k">Telas ativas</div><div class="v">${r.telas_ativas}</div></div>
        <div class="stat"><div class="k">Online agora</div><div class="v gold">${r.telas_online}</div></div>
        <div class="stat"><div class="k">Offline</div><div class="v">${r.telas_offline}</div></div>
        <div class="stat"><div class="k">Campanhas no ar</div><div class="v gold">${r.campanhas_no_ar}</div></div>
        <div class="stat"><div class="k">Contas ativas</div><div class="v">${r.contas_ativas}/${r.contas_total}</div></div>
        <div class="stat"><div class="k">Usuários</div><div class="v">${r.usuarios_total}</div></div>
        <div class="stat"><div class="k">Mídia armazenada</div><div class="v">${fmtBytes(r.midia_total_bytes)}</div></div>
      </div>`;
  }catch(e){ V().innerHTML='<p style="color:var(--bad)">Erro: '+esc(e.message)+'</p>'; }
}

/* ---------- USUÁRIOS ---------- */
async function carregarContas(){
  if(ACCOUNTS.length) return ACCOUNTS;
  // tenta pelo cliente logado (RLS de superadmin permite ler accounts)
  const { data } = await sb.from('accounts').select('id,nome,ativo').order('nome');
  ACCOUNTS = (data||[]).filter(a=>a.ativo!==false);
  return ACCOUNTS;
}
async function viewUsuarios(){
  loading();
  try{
    const { usuarios } = await call('listar_usuarios');
    const rows = usuarios.map(u=>{
      const hoteis = (u.hoteis||[]).map(h=>esc(h.hotel)).join(', ') || '—';
      return `<tr>
        <td><b>${esc(u.nome||'—')}</b><br><small class="hint">${esc(u.email)}</small></td>
        <td>${esc(u.role)}</td>
        <td>${hoteis}</td>
        <td><span class="pill ${u.ativo?'on':'off'}">${u.ativo?'Ativo':'Inativo'}</span></td>
        <td style="white-space:nowrap">
          <button class="ghost" onclick='resetar("${u.id}","${esc(u.email)}")'>Senha</button>
          <button class="ghost" onclick='vincular("${u.id}")'>Hotéis</button>
          <button class="danger" onclick='toggleUser("${u.id}",${u.ativo?'false':'true'})'>${u.ativo?'Desativar':'Ativar'}</button>
        </td></tr>`;
    }).join('');
    V().innerHTML = `
      <div class="top"><div><h1>Usuários & Acessos</h1><small class="hint">Criar logins, redefinir senha e controlar acesso</small></div>
        <button class="solid" onclick="novoUsuario()">＋ Novo usuário</button></div>
      <div class="panel"><table>
        <thead><tr><th>Usuário</th><th>Papel</th><th>Hotéis</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="color:var(--mut)">Nenhum usuário.</td></tr>'}</tbody>
      </table></div>`;
  }catch(e){ V().innerHTML='<p style="color:var(--bad)">Erro: '+esc(e.message)+'</p>'; }
}

function modal(html){ document.getElementById('modalRoot').innerHTML = `<div class="ov" onclick="if(event.target===this)fecha()"><div class="modal">${html}</div></div>`; }
function fecha(){ document.getElementById('modalRoot').innerHTML=''; }

async function novoUsuario(){
  await carregarContas();
  const chks = ACCOUNTS.map(a=>`<label class="chk"><input type="checkbox" value="${a.id}"> ${esc(a.nome)}</label>`).join('') || '<small class="hint">Nenhuma conta cadastrada.</small>';
  modal(`<h3>Novo usuário</h3>
    <label>Nome</label><input id="nu_nome">
    <label>E-mail</label><input id="nu_email" type="email">
    <label>Senha inicial</label><input id="nu_senha" type="text" placeholder="defina uma senha">
    <label>Papel</label>
    <select id="nu_role">
      <option value="gerente_unidade">Gerente de unidade (1 hotel)</option>
      <option value="gerente_geral">Gerente geral (vários hotéis)</option>
      <option value="marketing">Marketing</option>
      <option value="operator">Operador</option>
      <option value="admin">Admin</option>
    </select>
    <label>Hotéis que pode acessar</label>
    <div id="nu_contas" style="max-height:160px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:10px">${chks}</div>
    <div class="msg err" id="nu_msg"></div>
    <div class="mr"><button class="ghost" onclick="fecha()">Cancelar</button><button class="solid" onclick="salvarUsuario()">Criar usuário</button></div>`);
}
async function salvarUsuario(){
  const nome=val('nu_nome'), email=val('nu_email'), senha=val('nu_senha'), role=val('nu_role');
  const contas=[...document.querySelectorAll('#nu_contas input:checked')].map(c=>c.value);
  const m=document.getElementById('nu_msg');
  if(!email||!senha){ m.textContent='Informe e-mail e senha.'; return; }
  m.textContent='Criando…'; m.className='msg';
  try{ await call('criar_usuario',{nome,email,senha,role,contas}); fecha(); viewUsuarios(); }
  catch(e){ m.textContent='Erro: '+e.message; m.className='msg err'; }
}
function resetar(id,email){
  modal(`<h3>Redefinir senha</h3><small class="hint">${esc(email)}</small>
    <label>Nova senha</label><input id="rs_senha" type="text" placeholder="nova senha">
    <div class="msg err" id="rs_msg"></div>
    <div class="mr"><button class="ghost" onclick="fecha()">Cancelar</button>
      <button class="solid" onclick="salvarReset('${id}')">Salvar senha</button></div>
    <hr style="border-color:var(--line);margin:16px 0">
    <small class="hint">Ou gere um link para a pessoa criar a própria senha:</small>
    <div style="margin-top:8px"><button class="ghost" onclick="gerarLink('${esc(email)}')">Gerar link de senha</button></div>
    <div id="rs_link" style="margin-top:10px;font-size:12px;word-break:break-all"></div>`);
}
async function salvarReset(id){
  const senha=val('rs_senha'); const m=document.getElementById('rs_msg');
  if(!senha){ m.textContent='Digite a nova senha.'; return; }
  m.textContent='Salvando…'; m.className='msg';
  try{ await call('redefinir_senha',{user_id:id,senha}); fecha(); alert('Senha redefinida.'); }
  catch(e){ m.textContent='Erro: '+e.message; m.className='msg err'; }
}
async function gerarLink(email){
  const box=document.getElementById('rs_link'); box.textContent='Gerando…';
  try{ const {link}=await call('gerar_link_senha',{email}); box.innerHTML='<b>Link:</b><br>'+esc(link); }
  catch(e){ box.textContent='Erro: '+e.message; }
}
async function toggleUser(id,ativo){
  if(!confirm(ativo?'Reativar este usuário?':'Desativar o acesso deste usuário?')) return;
  try{ await call('ativar_desativar',{user_id:id,ativo}); viewUsuarios(); }
  catch(e){ alert('Erro: '+e.message); }
}
async function vincular(id){
  await carregarContas();
  const chks = ACCOUNTS.map(a=>`<label class="chk"><input type="checkbox" value="${a.id}"> ${esc(a.nome)}</label>`).join('');
  modal(`<h3>Hotéis do usuário</h3>
    <small class="hint">Marque os hotéis que este usuário pode acessar.</small>
    <div style="max-height:200px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:8px" id="vc_contas">${chks}</div>
    <div class="msg err" id="vc_msg"></div>
    <div class="mr"><button class="ghost" onclick="fecha()">Cancelar</button>
      <button class="solid" onclick="salvarVinculo('${id}')">Salvar</button></div>`);
}
async function salvarVinculo(id){
  const contas=[...document.querySelectorAll('#vc_contas input:checked')].map(c=>c.value);
  const m=document.getElementById('vc_msg'); m.textContent='Salvando…'; m.className='msg';
  try{ await call('vincular_hoteis',{user_id:id,contas}); fecha(); viewUsuarios(); }
  catch(e){ m.textContent='Erro: '+e.message; m.className='msg err'; }
}
const val=id=>document.getElementById(id).value.trim();

/* ---------- RELATÓRIO TELAS ---------- */
function hojeISO(){ return new Date().toISOString().slice(0,10); }
function diasAtrasISO(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
async function viewTelas(){
  V().innerHTML = `
    <div class="top"><div><h1>Relatório de Telas</h1><small class="hint">Status, versão e dias online no período</small></div></div>
    <div class="panel"><div class="filters">
      <div><label>Início</label><input type="date" id="t_ini" value="${diasAtrasISO(30)}"></div>
      <div><label>Fim</label><input type="date" id="t_fim" value="${hojeISO()}"></div>
      <button class="solid" onclick="rodarTelas()">Gerar</button>
      <button class="ghost" onclick="exportCSV('tbl_telas','telas')">⭳ Exportar CSV</button>
    </div></div>
    <div class="panel" id="t_res"><small class="hint">Escolha o período e clique em Gerar.</small></div>`;
  rodarTelas();
}
async function rodarTelas(){
  const inicio=val('t_ini'), fim=val('t_fim');
  document.getElementById('t_res').innerHTML='<small class="hint">Carregando…</small>';
  try{
    const { telas, periodo } = await call('relatorio_telas',{inicio,fim});
    const rows=telas.map(t=>`<tr>
      <td>${esc(t.hotel)}</td><td>${esc(t.canal)}</td>
      <td><span class="code">${esc(t.codigo)}</span></td>
      <td><span class="pill ${t.status==='Online'?'on':'off'}">${t.status}</span></td>
      <td>${fmtData(t.ultimo_acesso)}</td><td>${esc(t.versao)}</td>
      <td style="text-align:center">${t.dias_online}</td><td style="text-align:center">${t.dias_offline}</td></tr>`).join('');
    document.getElementById('t_res').innerHTML=`
      <div class="panel-h"><h2 style="margin:0">${telas.length} tela(s) · ${periodo.dias} dia(s) no histórico</h2></div>
      <table id="tbl_telas"><thead><tr><th>Hotel</th><th>Canal</th><th>Código</th><th>Status</th><th>Último acesso</th><th>Versão</th><th>Dias on</th><th>Dias off</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="color:var(--mut)">Sem dados.</td></tr>'}</tbody></table>`;
  }catch(e){ document.getElementById('t_res').innerHTML='<p style="color:var(--bad)">Erro: '+esc(e.message)+'</p>'; }
}

/* ---------- RELATÓRIO CAMPANHAS ---------- */
async function viewCampanhas(){
  loading();
  try{
    const { campanhas, contagem } = await call('relatorio_campanhas');
    const rows=campanhas.map(c=>{
      const cls=c.status==='No ar'?'no':(c.status==='Pausada'||c.status==='Encerrada'?'off':'on');
      return `<tr><td>${esc(c.hotel)}</td><td><b>${esc(c.campanha)}</b></td>
        <td>${esc(c.inicio)}</td><td>${esc(c.fim)}</td><td style="text-align:center">${esc(c.frequencia)}</td>

    }).join('');
    V().innerHTML=`
      <div class="top"><div><h1>Relatório de Campanhas</h1></div>
        <button class="ghost" onclick="exportCSV('tbl_camp','campanhas')">⭳ Exportar CSV</button></div>

        <div class="stat"><div class="k">No ar</div><div class="v gold">${contagem['No ar']}</div></div>
        <div class="stat"><div class="k">Agendadas</div><div class="v">${contagem['Agendada']}</div></div>
        <div class="stat"><div class="k">Encerradas</div><div class="v">${contagem['Encerrada']}</div></div>
        <div class="stat"><div class="k">Pausadas</div><div class="v">${contagem['Pausada']}</div></div>
      </div>
      <div class="panel"><table id="tbl_camp"><thead><tr><th>Hotel</th><th>Campanha</th><th>Início</th><th>Fim</th><th>Freq.</th><th>Status</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="6" style="color:var(--mut)">Nenhuma campanha.</td></tr>'}</tbody></table></div>`;
  }catch(e){ V().innerHTML='<p style="color:var(--bad)">Erro: '+esc(e.message)+'</p>'; }

/* ---------- RELATÓRIO CONTAS ---------- */
async function viewContas(){
  loading();
  try{
    const { contas } = await call('relatorio_contas');
    const rows=contas.map(c=>`<tr>
      <td><b>${esc(c.hotel)}</b><br><small class="hint">${esc(c.cnpj)}</small></td>
      <td><span class="pill ${c.ativo?'on':'off'}">${c.ativo?'Ativa':'Inativa'}</span></td>
      <td>${esc(c.plano||'—')}</td>

      <td style="text-align:center">${c.midias}</td>
      <td>${fmtBytes(c.midia_bytes)}</td></tr>`).join('');
    V().innerHTML=`
      <div class="top"><div><h1>Relatório de Contas / Hotéis</h1></div>
        <button class="ghost" onclick="exportCSV('tbl_contas','contas')">⭳ Exportar CSV</button></div>
      <div class="panel"><table id="tbl_contas"><thead><tr><th>Hotel</th><th>Status</th><th>Plano</th><th>Canais</th><th>Usuários</th><th>Mídias</th><th>Armazenado</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="7" style="color:var(--mut)">Nenhuma conta.</td></tr>'}</tbody></table></div>`;
  }catch(e){ V().innerHTML='<p style="color:var(--bad)">Erro: '+esc(e.message)+'</p>'; }
}

/* ---------- exportar CSV ---------- */
function exportCSV(tableId, nome){
  const tb=document.getElementById(tableId); if(!tb){ alert('Gere o relatório primeiro.'); return; }
  const linhas=[...tb.querySelectorAll('tr')].map(tr=>
    [...tr.querySelectorAll('th,td')].map(td=>{
      let txt=td.innerText.replace(/\s+/g,' ').trim();
      return '"'+txt.replace(/"/g,'""')+'"';
    }).join(';')
  ).join('\r\n');
  const blob=new Blob(['\ufeff'+linhas],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='blinplay_'+nome+'_'+hojeISO()+'.csv';
  a.click();
}
