<style>
  :root{ --gold:#F5A800; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}
  #stage{position:fixed;inset:0;background:#000}
  .slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .6s ease}
  .slide.on{opacity:1}
  .slide img,.slide video{width:100%;height:100%;object-fit:contain;background:#000}

  /* telas de estado (sem token, carregando, erro) */
  #msg{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:#0a0a0c;color:#f4f3ee;font-family:system-ui,sans-serif;text-align:center;padding:30px;gap:14px}
  #msg.show{display:flex}
  #msg .sym{height:88px;width:auto;filter:drop-shadow(0 0 30px rgba(245,168,0,.4));margin-bottom:4px}
  #msg .wordmark{height:34px;width:auto;opacity:.96}
  #msg p{font-size:16px;color:#9a9aa4;max-width:520px;line-height:1.5}
  #msg .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);
    border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #msg code{background:rgba(255,255,255,.08);padding:3px 8px;border-radius:6px;font-size:14px;color:#ffd9a0}

const RESYNC_FALLBACK_MS = 15 * 1000;  // FALLBACK rápido: checa a cada 15s quando Realtime NÃO está confirmado
let resyncTimer = null;
let realtimeOK = false;  // vira true quando o Realtime confirma a conexão

/* ================= ESTADO ================= */
let sb = null;
let token = null;
let playlist = [];      // sequência final já montada (padrão + campanhas no rodízio)
let idx = 0;
let slideTimer = null;
let lastSig = '';       // assinatura da playlist (pra trocar só quando muda)
let CHANNEL_ID = null;  // id do canal (vem da RPC) — usado no Realtime
let rtChannel = null;   // canal de assinatura Realtime
let rtDebounce = null;  // evita re-sync múltiplo em rajada de eventos

/* ================= HELPERS UI ================= */
function showMsg(txt, spinning){
  const m=document.getElementById('msg');
  document.getElementById('msgtxt').innerHTML = txt;
  m.querySelector('.spin').style.display = spinning ? 'block' : 'none';
  m.classList.add('show');
}
function hideMsg(){ document.getElementById('msg').classList.remove('show'); }

/* ================= MONTAGEM DO RODÍZIO =================
   Recebe o JSON do banco e monta a sequência final:
   conteúdo padrão na ordem, e cada campanha entra "1 a cada N itens".
   Ex: freq=4  ->  padrão,padrão,padrão,CAMPANHA,padrão,padrão,padrão,CAMPANHA...
*/
function montarPlaylist(data){
  const padrao = (data.padrao||[]).map(m=>({...m, camp:false, campNome:null}));
  const camps  = (data.campanhas||[]).filter(c=>c && c.itens && c.itens.length);

  if(padrao.length===0 && camps.length===0) return [];

  // se não há padrão, toca só as campanhas em sequência
  if(padrao.length===0){
    const out=[];
    camps.forEach(c=> c.itens.forEach(it=> out.push({...it, camp:true, campNome:c.nome})));
    return out;
  }

  // PRESENÇA MÍNIMA GARANTIDA:
  // o intervalo efetivo nunca passa do tamanho do padrão — assim toda campanha
  // ativa entra PELO MENOS 1x por volta do rodízio, independente do N escolhido.
  // O N só REDUZ o intervalo (= mais presença) quando o padrão é grande.
  const out=[];
  let count=0;
  const campPtr = camps.map(()=>0);   // ponteiro circular das mídias de cada campanha
  const campInseriu = camps.map(()=>false); // se a campanha já entrou nesta volta

  for(let i=0;i<padrao.length;i++){
    out.push(padrao[i]); count++;
    camps.forEach((c,ci)=>{
      // intervalo pedido, mas no máximo o tamanho do padrão (garante 1x/volta)
      const N = Math.min(Math.max(1, c.frequencia_a_cada||4), padrao.length);
      if(count % N === 0){
        const it = c.itens[campPtr[ci] % c.itens.length];
        campPtr[ci]++; campInseriu[ci]=true;
        out.push({...it, camp:true, campNome:c.nome});
      }
    });
  }

  // rede de segurança: se por algum arredondamento uma campanha não entrou
  // nenhuma vez nesta volta, insere ela 1x no fim — nunca fica de fora.
  camps.forEach((c,ci)=>{
    if(!campInseriu[ci]){
      const it = c.itens[campPtr[ci] % c.itens.length];
      out.push({...it, camp:true, campNome:c.nome});
    }
  });

  return out;
}

function assinatura(pl){
  return pl.map(x=>(x.camp?'C':'P')+x.path+(x.duracao||0)).join('|');
}

/* ================= REPRODUÇÃO ================= */
function tocar(){
  if(playlist.length===0){
    showMsg('Sem conteúdo programado para este canal.<br>Cadastre mídias no painel BlinPlay.', false);
    return;
  }
  hideMsg();
  clearTimeout(slideTimer);
  const item = playlist[idx];
  const stage = document.getElementById('stage');

  // cria o slide novo
  const slide = document.createElement('div');
  slide.className = 'slide';
  const url = MEDIA_BASE + item.path;
  let dwell = (item.duracao || 8) * 1000;

  if(item.tipo === 'video'){
    const v = document.createElement('video');
    v.src = url; v.muted = true; v.autoplay = true; v.playsInline = true;
    v.preload = 'auto';
    // quando o vídeo acabar, avança (respeita a duração real do vídeo)
    v.onended = avancar;
    v.onerror = ()=> setTimeout(avancar, 1000);
    slide.appendChild(v);
    // segurança: se o vídeo travar, avança pela duração informada + folga
    dwell = (item.duracao || 30) * 1000 + 4000;
    slide.dataset.video = '1';
  } else {
    const im = document.createElement('img');
    im.src = url;
    im.onerror = ()=> setTimeout(avancar, 1000);
    slide.appendChild(im);
  }

  stage.appendChild(slide);
  requestAnimationFrame(()=> slide.classList.add('on'));

  // selo de campanha
  const flag = document.getElementById('flag');
  if(item.camp){ flag.textContent = '● ' + (item.campNome||'Campanha'); flag.classList.add('show'); }
  else flag.classList.remove('show');

  // limpa slides antigos (mantém só os 2 últimos pra transição suave)
  while(stage.children.length > 2) stage.removeChild(stage.firstChild);

  // agenda avanço (vídeo avança no onended; imagem/segurança pelo timer)
  if(!slide.dataset.video) slideTimer = setTimeout(avancar, dwell);
  else slideTimer = setTimeout(avancar, dwell); // fallback de segurança
}

function avancar(){
  clearTimeout(slideTimer);
  idx = (idx + 1) % playlist.length;
  tocar();
}

/* ================= SINCRONIZAÇÃO ================= */
async function sincronizar(primeira){
  try{
    const { data, error } = await sb.rpc('get_player_schedule', { p_token: token });
    if(error) throw error;
    if(!data || data.ok === false){
      showMsg('Token inválido ou canal inativo.<br>Verifique a URL configurada no box.', false);
      return;
    }
    // guarda a última programação boa (pra abrir offline na próxima vez)
    try{ localStorage.setItem('blinplay_sched_'+token, JSON.stringify(data)); }catch(e){}
    if(data.canal && data.canal.id) CHANNEL_ID = data.canal.id;
    aplicarPrograma(data, primeira);
    precarregarMidias(data);   // manda o cache baixar tudo em background
  }catch(ex){
    // sem rede: se não há nada tocando, tenta a última programação salva
    if(playlist.length===0){
      let salvo=null;
      try{ salvo=JSON.parse(localStorage.getItem('blinplay_sched_'+token)); }catch(e){}
      if(salvo){ aplicarPrograma(salvo, true); }
      else showMsg('Sem conexão com o servidor.<br>Tentando novamente…', true);
    }
    // se já está tocando, mantém tocando (resiliência total)
  }
}

function aplicarPrograma(data, primeira){
  const nova = montarPlaylist(data);
  const sig = assinatura(nova);
  if(sig !== lastSig){
    lastSig = sig;
    playlist = nova;
    if(primeira || idx >= playlist.length) idx = 0;
    tocar();
  }
}

// pede ao navegador pra baixar todas as mídias da playlist agora (vão pro cache do SW)
function precarregarMidias(data){
  const todas = [];
  (data.padrao||[]).forEach(m=> todas.push(m.path));
  (data.campanhas||[]).forEach(c=> (c.itens||[]).forEach(it=> todas.push(it.path)));
  todas.forEach(path=>{
    const url = MEDIA_BASE + path;
    // fetch silencioso: o Service Worker intercepta e guarda no cache
    fetch(url, { mode:'no-cors' }).catch(()=>{});
  });
}

/* ================= REALTIME =================
   Assina mudanças nas tabelas que afetam a programação. Em vez de
   ficar perguntando ao banco, o player é AVISADO no instante da mudança
   e re-sincroniza na hora (com debounce pra agrupar rajadas de eventos).
   Se a conexão cair, o setInterval de fallback (5 min) cobre o intervalo.
*/
function ligarRealtime(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} }

  const aoMudar = ()=>{
    clearTimeout(rtDebounce);
    rtDebounce = setTimeout(()=> sincronizar(false), 800); // agrupa eventos em 0,8s
  };

  // mudança no canal: pode ser conteúdo OU um pedido de refresh remoto
  const aoMudarCanal = (payload)=>{
    const novo = payload && payload.new ? payload.new : null;
    // se é o NOSSO canal e veio um pedido de refresh recente, recarrega a página
    if(novo && CHANNEL_ID && novo.id===CHANNEL_ID && novo.refresh_pedido_em){
      const quando = new Date(novo.refresh_pedido_em).getTime();
      if(Date.now() - quando < 60000){   // pedido dos últimos 60s
        location.reload();
        return;
      }
    }
    aoMudar();
  };

  rtChannel = sb.channel('blinplay-' + (CHANNEL_ID||token))
    .on('postgres_changes', { event:'*', schema:'public', table:'playlist_items'    }, aoMudar)
    .on('postgres_changes', { event:'*', schema:'public', table:'campaigns'          }, aoMudar)
    .on('postgres_changes', { event:'*', schema:'public', table:'campaign_items'      }, aoMudar)
    .on('postgres_changes', { event:'*', schema:'public', table:'campaign_channels'   }, aoMudar)
    .on('postgres_changes', { event:'*', schema:'public', table:'channels'            }, aoMudarCanal)
    .subscribe((status)=>{
      if(status==='SUBSCRIBED'){
        // Realtime conectou de verdade: pode desligar a checagem rápida
        realtimeOK = true;
        if(resyncTimer){ clearInterval(resyncTimer); resyncTimer=null; }
      }
      if(status==='CLOSED' || status==='CHANNEL_ERROR' || status==='TIMED_OUT'){
        // Realtime caiu/não conectou: garante a checagem rápida ligada e tenta religar
        realtimeOK = false;
        ligarFallback();
        setTimeout(ligarRealtime, 10000);
      }
    });
}

// checagem rápida periódica — roda sempre que o Realtime NÃO está confirmado
function ligarFallback(){
  if(resyncTimer) return;
  resyncTimer = setInterval(async ()=>{
    if(realtimeOK) return;
    sincronizar(false);
    // checa pedido de refresh remoto (já que o Realtime não está trazendo)
    if(token){
      try{
        const { data } = await sb.rpc('checar_refresh', { p_token: token });
        if(data){
          const quando = new Date(data).getTime();
          if(Date.now()-quando < RESYNC_FALLBACK_MS + 5000){ location.reload(); }
        }
      }catch(e){}
    }
  }, RESYNC_FALLBACK_MS);
}

/* ================= INÍCIO ================= */
function init(){
  const params = new URLSearchParams(location.search);
  token = params.get('token');

  if(!token){
    showMsg('Nenhum canal configurado.<br>Abra esta página com o token da estação:<br><br><code>player.html?token=SEU_TOKEN</code>', false);
    return;
  }

  sb = window.supabase.createClient(SB_URL, SB_KEY);
  showMsg('Carregando programação…', true);

  // registra o Service Worker (cache offline das mídias)
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }

  sincronizar(true).then(()=>{ ligarRealtime(); ligarFallback(); });

  // mantém a tela acordada (best-effort; o Fully reforça isso no box)
  if('wakeLock' in navigator){
    const lock = ()=> navigator.wakeLock.request('screen').catch(()=>{});
    lock();
    document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) lock(); });
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
